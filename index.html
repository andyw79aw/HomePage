<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AW Web Design</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        
        .hero {
            height: 100vh;
            background: #0a0a0a url('./assets/Images/bg.gif') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            text-align: center;
        }
        
        /* Subtle overlay for contrast (adjust opacity if needed) */
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 10, 0.45);
            z-index: 1;
        }
        
        .content {
            position: relative;
            z-index: 2;
            max-width: 120%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo {
            display: flex;
            max-width: clamp(3rem, 200vw, 60rem);  /*Responsive scaling*/
            height: 650;
            margin-bottom: 0.5rem;
            
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .buttons {
            display: flex;
            gap: clamp(1rem, 2vw, 2rem); /* Responsive gap */
            flex-wrap: wrap;
            justify-content: center;
        }

        .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;               /* space between buttons */
      justify-content: center; /* centers buttons on the page */
      max-width: 1200px;
      margin: 0 auto;
    }
        
        .btn {
            padding: clamp(12px, 2vw, 18px) clamp(32px, 5vw, 48px);
            font-size: clamp(1rem, 2vw, 1.15rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #1e40af, #22d3ee);
            color: white;
            border: none;
            box-shadow: 0 8px 30px rgba(34, 211, 238, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 15px 50px rgba(34, 211, 238, 0.6);
        }
        
        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid #22d3ee;
            box-shadow: 0 8px 30px rgba(34, 211, 238, 0.2);
        }
        
        .btn-secondary:hover {
            background: #22d3ee;
            color: #0a0a0a;
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 15px 50px rgba(34, 211, 238, 0.6);
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="content">
            <img src="./assets/Images/logoLarge-ezgif.com-effects.png" alt="AW Web Design Logo" class="logo">
            
            <div class="buttons">
                <div class="button-group">
                    <a href="./home.html"    class="btn btn-primary">Go to Home</a>
                    <a href="./Pages/portfolio.html"   class="btn btn-secondary">My Portfolio</a>

                  </div>
            </div>
        </div>
    </div>
    
    <script>
        // Optional: Add button functionality
        document.querySelector('.btn-primary').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        document.querySelector('.btn-secondary').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            // Or replace with: window.location.href = '/portfolio.html';
        });
    </script>
</body>
</html>
