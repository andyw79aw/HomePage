<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Me</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9fafb;
      margin: 0;
      padding: 40px 20px;
      color: #1f2937;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }
    h2 {
      text-align: center;
      margin: 0 0 32px;
    }
    .form-group {
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    textarea {
      min-height: 140px;
      resize: vertical;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) {
      background: #4f46e5;
    }
    button:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
    }
    .success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }
    .error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Get in Touch</h2>

    <form id="contact-form">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="John Doe" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="subject">Subject (optional)</label>
        <input type="text" id="subject" name="subject" placeholder="Project idea / Question" />
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="How can I help you?" required></textarea>
      </div>

      <!-- Honeypot field to catch bots (leave empty) -->
      <input type="text" name="_gotcha" style="display:none" />

      <button type="submit">Send Message</button>

      <div id="status"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('contact-form');
    const statusDiv = document.getElementById('status');
    const submitBtn = form.querySelector('button');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();           // ← this prevents page reload/blank

      statusDiv.textContent = '';
      statusDiv.className = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const response = await fetch('https://formspree.io/f/mdawnbkb', {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          statusDiv.textContent = 'Thank you! Your message has been sent.';
          statusDiv.className = 'success';
          form.reset();
        } else {
          throw new Error('Server responded with error');
        }
      } catch (err) {
        statusDiv.textContent = 'Sorry, something went wrong. Please try again later.';
        statusDiv.className = 'error';
        console.error(err);
      }

      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Message';
    });
  </script>

</body>
</html>
